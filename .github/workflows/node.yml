name: Node.js CI/CD

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Test Backend
        working-directory: ./backend
        run: |
          npm ci
          npm test

      - name: Install & Build Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
